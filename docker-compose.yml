services:
  hrms-backend:
    build:
      context: ./hrms-backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      # Add other backend env variables here or use an .env file
    env_file:
      - ./hrms-backend/.env
    restart: always

  hrms-frontend:
    build:
      context: ./hrms-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001
    depends_on:
      - hrms-backend
    restart: always
